version: '3.8'
services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/html:/usr/share/nginx/html:ro
    depends_on:
      - api
      - orthanc
      - viewer

  orthanc:
    image: orthancteam/orthanc:latest
    command: /etc/orthanc/orthanc.json
    volumes:
      - ./orthanc-config/orthanc.json:/etc/orthanc/orthanc.json:ro
      - orthanc_db:/var/lib/orthanc/db

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=radio
      - POSTGRES_PASSWORD=radio123
      - POSTGRES_DB=cases
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radio -d cases"]
      interval: 3s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://radio:radio123@db/cases
    depends_on:
      db:
        condition: service_healthy

  viewer:
    image: ohif/viewer:latest
    ports:
      - "3000:80"
    environment:
      - APP_CONFIG=/usr/share/nginx/html/app-config.js
    volumes:
      - ./frontend/ohif-config.js:/usr/share/nginx/html/app-config.js:ro
      - ./frontend/ohif-index-fixed.html:/usr/share/nginx/html/index.html:ro

volumes:
  pgdata:
  orthanc_db:
