<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>放射科专业病例阅片学习平台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: rgba(255,255,255,0.95); border-radius: 15px; padding: 20px 30px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: #333; font-size: 24px; }
        .header h1 span { color: #667eea; }
        .auth-section { display: flex; align-items: center; gap: 10px; }
        .auth-section input { padding: 10px 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; width: 150px; transition: border-color 0.3s; }
        .auth-section input:focus { outline: none; border-color: #667eea; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all 0.3s; font-weight: 500; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .btn-secondary { background: #f5f5f5; color: #333; }
        .btn-secondary:hover { background: #e0e0e0; }
        .btn-danger { background: #ff4757; color: white; }
        .btn-success { background: #2ed573; color: white; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-info .username { color: #333; font-weight: 500; }
        .user-info .role { background: #667eea; color: white; padding: 3px 10px; border-radius: 12px; font-size: 12px; }
        .main-content { background: rgba(255,255,255,0.95); border-radius: 15px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .section-title { color: #333; font-size: 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ''; width: 4px; height: 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 2px; }
        /* 系统分类卡片 */
        .systems-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .system-card { background: white; border: 2px solid #e0e0e0; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .system-card:hover { transform: translateY(-5px); border-color: #667eea; box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2); }
        .system-card.active { border-color: #667eea; background: linear-gradient(135deg, rgba(102,126,234,0.1) 0%, rgba(118,75,162,0.1) 100%); }
        .system-card .icon { font-size: 36px; margin-bottom: 10px; }
        .system-card .name { font-weight: 600; color: #333; margin-bottom: 5px; font-size: 16px; }
        .system-card .desc { color: #888; font-size: 12px; line-height: 1.4; }
        /* 病例列表 */
        .cases-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .filter-info { color: #666; font-size: 14px; }
        .filter-info span { color: #667eea; font-weight: 600; }
        .cases-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .case-card { background: white; border: 1px solid #e0e0e0; border-radius: 12px; padding: 20px; cursor: pointer; transition: all 0.3s; }
        .case-card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-color: #667eea; }
        .case-card .case-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 10px; }
        .case-card .case-meta { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .case-card .meta-tag { background: #f0f0f0; padding: 3px 10px; border-radius: 12px; font-size: 12px; color: #666; }
        .case-card .meta-tag.modality { background: #e3f2fd; color: #1976d2; }
        .case-card .meta-tag.difficulty { background: #fff3e0; color: #f57c00; }
        .case-card .case-desc { color: #666; font-size: 14px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .empty-state { text-align: center; padding: 60px 20px; color: #888; }
        .empty-state .icon { font-size: 64px; margin-bottom: 20px; }
        .empty-state p { font-size: 16px; }
        /* 上传区域 */
        .upload-section { margin-top: 30px; padding-top: 30px; border-top: 2px solid #e0e0e0; }
        .upload-area { border: 2px dashed #667eea; border-radius: 12px; padding: 40px; text-align: center; background: rgba(102,126,234,0.05); transition: all 0.3s; }
        .upload-area:hover { background: rgba(102,126,234,0.1); }
        .upload-area.dragover { background: rgba(102,126,234,0.2); border-color: #764ba2; }
        .upload-area .icon { font-size: 48px; margin-bottom: 15px; }
        .upload-area p { color: #666; margin-bottom: 15px; }
        .upload-area input[type="file"] { display: none; }
        .upload-progress { margin-top: 20px; display: none; }
        .progress-bar { height: 20px; background: #e0e0e0; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); width: 0%; transition: width 0.3s; }
        .upload-results { margin-top: 20px; }
        .upload-result-item { padding: 10px; margin-bottom: 5px; border-radius: 5px; font-size: 14px; }
        .upload-result-item.success { background: #d4edda; color: #155724; }
        .upload-result-item.error { background: #f8d7da; color: #721c24; }
        /* DICOM 研究列表 */
        .dicom-studies { margin-top: 30px; }
        .study-card { background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; margin-bottom: 10px; }
        .study-card .study-info { display: flex; justify-content: space-between; align-items: center; }
        .study-card .study-details { color: #666; font-size: 13px; }
        /* 消息提示 */
        .toast { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 10px; color: white; font-weight: 500; z-index: 1000; animation: slideIn 0.3s ease; }
        .toast.success { background: #2ed573; }
        .toast.error { background: #ff4757; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        /* 响应式 */
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 15px; }
            .auth-section { flex-wrap: wrap; justify-content: center; }
            .systems-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
            .cases-grid { grid-template-columns: 1fr; }
        }
        /* 模态框样式 */
        #case-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🏥 <span>放射科</span>专业病例阅片学习平台</h1>
            <div id="auth-section" class="auth-section">
                <input type="text" id="username" placeholder="用户名">
                <input type="password" id="password" placeholder="密码">
                <button class="btn btn-primary" onclick="login()">登录</button>
                <button class="btn btn-secondary" onclick="register()">注册</button>
            </div>
            <div id="user-section" class="user-info" style="display: none;">
                <span class="username" id="display-username"></span>
                <span class="role" id="display-role"></span>
                <button class="btn btn-danger" onclick="logout()">退出</button>
            </div>
        </div>

        <!-- 主内容 -->
        <div class="main-content">
            <!-- 系统分类 -->
            <h2 class="section-title">按系统分类</h2>
            <div class="systems-grid" id="systems-grid"></div>

            <!-- 病例列表 -->
            <div class="cases-header">
                <h2 class="section-title">病例列表</h2>
                <div class="filter-info" id="filter-info">显示全部病例</div>
            </div>
            <div class="cases-grid" id="cases-grid"></div>
            <div class="empty-state" id="empty-state" style="display: none;">
                <div class="icon">📋</div>
                <p>暂无病例数据</p>
            </div>

            <!-- DICOM 上传区域 (仅教师/管理员可见) -->
            <div id="upload-section" class="upload-section" style="display: none;">
                <h2 class="section-title">📤 上传 DICOM 文件</h2>
                <div class="upload-area" id="upload-area">
                    <div class="icon">📁</div>
                    <p>拖拽 DICOM 文件/文件夹到此处，或点击选择</p>
                    <p style="font-size: 12px; color: #999;">支持 .dcm 文件和无扩展名的 DICOM 文件，可批量上传</p>
                    <select id="upload-system-id" style="margin-bottom: 15px; padding: 8px; width: 80%; border-radius: 4px; background: #333; color: white; border: 1px solid #555;">
                        <option value="">-- (可选) 归档至指定系统 --</option>
                    </select>
                    <br>
                    <input type="file" id="dicom-files" multiple onchange="handleFileSelect(this)" style="display: none;">
                    <input type="file" id="dicom-folder" webkitdirectory directory multiple onchange="handleFolderSelect(this)" style="display: none;">
                    <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
                        <button class="btn btn-primary" onclick="document.getElementById('dicom-files').click()">选择文件</button>
                        <button class="btn btn-secondary" onclick="document.getElementById('dicom-folder').click()">选择文件夹</button>
                    </div>
                </div>
                <div class="upload-progress" id="upload-progress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <p id="progress-text">上传中...</p>
                </div>
                <div class="upload-results" id="upload-results"></div>
            </div>

            <!-- DICOM 研究列表 -->
            <div id="dicom-studies" class="dicom-studies" style="display: none;">
                <h2 class="section-title">📚 已上传的 DICOM 研究</h2>
                <div id="studies-list"></div>
            </div>
        </div>
    </div>

    <!-- 创建病例模态框 -->
    <div id="case-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: none; justify-content: center; align-items: center;">
        <div style="background: white; border-radius: 12px; padding: 30px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto;">
            <h2 style="margin-top: 0; color: #333;">创建病例</h2>
            <form id="case-form" onsubmit="submitCase(event)">
                <input type="hidden" id="case-orthanc-id">
                <input type="hidden" id="case-study-uid">

                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">病例标题 *</label>
                    <input type="text" id="case-title" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">扫描部位</label>
                    <input type="text" id="case-body-part" placeholder="如：胸部、腹部、头部" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">检查模态</label>
                    <select id="case-modality" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">
                        <option value="">请选择</option>
                        <option value="CT">CT</option>
                        <option value="MRI">MRI</option>
                        <option value="X-Ray">X-Ray</option>
                        <option value="US">超声</option>
                        <option value="PET">PET</option>
                        <option value="其他">其他</option>
                    </select>
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">所属系统</label>
                    <select id="case-system" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">
                        <option value="">请选择</option>
                    </select>
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">病史</label>
                    <textarea id="case-history" rows="3" placeholder="患者主诉、现病史、既往史等" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;"></textarea>
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">临床诊断</label>
                    <textarea id="case-diagnosis" rows="2" placeholder="临床初步诊断" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;"></textarea>
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">影像表现 (Findings)</label>
                    <textarea id="case-findings" rows="4" placeholder="影像学所见" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;"></textarea>
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">诊断意见 (Impression)</label>
                    <textarea id="case-impression" rows="3" placeholder="影像学诊断意见" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;"></textarea>
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">结论 (Conclusion)</label>
                    <textarea id="case-conclusion" rows="2" placeholder="最终结论" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;"></textarea>
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">教学要点</label>
                    <textarea id="case-teaching" rows="2" placeholder="本病例的教学要点" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;"></textarea>
                </div>

                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" onclick="closeCaseForm()" style="padding: 10px 20px; background: #ccc; border: none; border-radius: 6px; cursor: pointer;">取消</button>
                    <button type="submit" style="padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer;">创建病例</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentSystemId = null;
        let currentUser = null;
        let token = localStorage.getItem('radio_token');

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadSystems();
            loadCases();
            setupDragDrop();
        });

        // ==================== 认证相关 ====================
        function checkAuth() {
            const userStr = localStorage.getItem('radio_user');
            if (token && userStr) {
                currentUser = JSON.parse(userStr);
                showUserInfo();
            }
        }

        function showUserInfo() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('user-section').style.display = 'flex';
            document.getElementById('display-username').textContent = currentUser.username;
            const roleText = currentUser.role === 'admin' ? '管理员' : currentUser.role === 'teacher' ? '教师' : '学生';
            document.getElementById('display-role').textContent = roleText;

            // 所有登录用户都能看到 DICOM 研究列表和上传功能
            document.getElementById('dicom-studies').style.display = 'block';
            document.getElementById('upload-section').style.display = 'block';
            loadDicomStudies();
        }

        function showAuthForm() {
            document.getElementById('auth-section').style.display = 'flex';
            document.getElementById('user-section').style.display = 'none';
            document.getElementById('upload-section').style.display = 'none';
            document.getElementById('dicom-studies').style.display = 'none';
        }

        async function register() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!username || !password) {
                showToast('请输入用户名和密码', 'error');
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    showToast('注册成功！请登录', 'success');
                } else {
                    showToast(data.detail || '注册失败', 'error');
                }
            } catch (err) {
                showToast('网络错误，请重试', 'error');
            }
        }

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!username || !password) {
                showToast('请输入用户名和密码', 'error');
                return;
            }
            try {
                const formData = new URLSearchParams();
                formData.append('username', username);
                formData.append('password', password);
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                const data = await res.json();
                if (res.ok) {
                    token = data.access_token;
                    localStorage.setItem('radio_token', token);
                    const userRes = await fetch(`${API_BASE}/auth/me`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (userRes.ok) {
                        const userData = await userRes.json();
                        localStorage.setItem('radio_user', JSON.stringify(userData));
                        currentUser = userData;
                        showUserInfo();
                        showToast(`欢迎回来，${username}！`, 'success');
                    }
                } else {
                    showToast(data.detail || '登录失败', 'error');
                }
            } catch (err) {
                showToast('网络错误，请重试', 'error');
            }
        }

        function logout() {
            localStorage.removeItem('radio_token');
            localStorage.removeItem('radio_user');
            token = null;
            currentUser = null;
            showAuthForm();
            showToast('已退出登录', 'success');
        }

        // ==================== 系统分类 ====================
        async function loadSystems() {
            try {
                const res = await fetch(`${API_BASE}/systems/`);
                if (res.ok) {
                    const systems = await res.json();
                    renderSystems(systems);
                }
            } catch (err) {
                console.error('加载系统分类失败:', err);
            }
        }

        function renderSystems(systems) {
            const grid = document.getElementById('systems-grid');
            grid.innerHTML = `
                <div class="system-card ${currentSystemId === null ? 'active' : ''}" onclick="filterBySystem(null)">
                    <div class="icon">🏥</div>
                    <div class="name">全部系统</div>
                    <div class="desc">显示所有病例</div>
                </div>
            `;
            systems.forEach(system => {
                grid.innerHTML += `
                    <div class="system-card ${currentSystemId === system.id ? 'active' : ''}" onclick="filterBySystem(${system.id})">
                        <div class="icon">${system.icon || '🔬'}</div>
                        <div class="name">${system.name}</div>
                        <div class="desc">${system.description || ''}</div>
                    </div>
                `;
            });

            // 同步更新上传区域的系统选择下拉框
            const uploadSystemSelect = document.getElementById('upload-system-id');
            if (uploadSystemSelect) {
                uploadSystemSelect.innerHTML = '<option value="">-- (可选) 归档至指定系统 --</option>';
                systems.forEach(system => {
                    uploadSystemSelect.innerHTML += `<option value="${system.id}">${system.icon || '🔬'} ${system.name}</option>`;
                });
            }
        }

        function filterBySystem(systemId) {
            currentSystemId = systemId;
            loadCases();
            loadSystems();
        }

        // ==================== 病例列表 ====================
        async function loadCases() {
            try {
                let url = `${API_BASE}/cases/?limit=100`;
                if (currentSystemId) url += `&system_id=${currentSystemId}`;
                const res = await fetch(url);
                if (res.ok) {
                    const cases = await res.json();
                    renderCases(cases);
                }
            } catch (err) {
                console.error('加载病例失败:', err);
            }
        }

        function renderCases(cases) {
            const grid = document.getElementById('cases-grid');
            const emptyState = document.getElementById('empty-state');
            const filterInfo = document.getElementById('filter-info');

            if (cases.length === 0) {
                grid.innerHTML = '';
                emptyState.style.display = 'block';
                filterInfo.innerHTML = currentSystemId ? '当前系统暂无病例' : '暂无病例数据';
                return;
            }

            emptyState.style.display = 'none';
            filterInfo.innerHTML = `共 ${cases.length} 个病例`;

            grid.innerHTML = cases.map(c => `
                <div class="case-card">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div onclick="viewCase(${c.id})" style="flex: 1; cursor: pointer;">
                            <div class="case-title">${c.title || '未命名病例'}</div>
                            <div class="case-meta">
                                ${c.modality ? `<span class="meta-tag modality">${c.modality}</span>` : ''}
                                ${c.difficulty_level ? `<span class="meta-tag difficulty">难度 ${'⭐'.repeat(c.difficulty_level)}</span>` : ''}
                                ${c.body_part ? `<span class="meta-tag">${c.body_part}</span>` : ''}
                            </div>
                            <div class="case-desc">${c.description || '暂无描述'}</div>
                        </div>
                        <button onclick="event.stopPropagation(); deleteCase(${c.id})" style="background: #ff4757; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-left: 10px;">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function viewCase(caseId) {
            window.location.href = `/study.html?case_id=${caseId}`;
        }

        async function deleteCase(caseId) {
            if (!confirm('确定要删除这个病例吗？')) return;

            try {
                const res = await fetch(`${API_BASE}/cases/${caseId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    showToast('病例已删除', 'success');
                    loadCases();
                } else {
                    showToast('删除失败', 'error');
                }
            } catch (err) {
                showToast('删除出错: ' + err.message, 'error');
            }
        }

        // ==================== DICOM 上传 ====================
        function setupDragDrop() {
            const uploadArea = document.getElementById('upload-area');
            if (!uploadArea) return;

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                uploadArea.addEventListener(eventName, preventDefaults, false);
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            ['dragenter', 'dragover'].forEach(eventName => {
                uploadArea.addEventListener(eventName, () => uploadArea.classList.add('dragover'), false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                uploadArea.addEventListener(eventName, () => uploadArea.classList.remove('dragover'), false);
            });

            uploadArea.addEventListener('drop', handleDrop, false);
        }

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        function handleFileSelect(input) {
            handleFiles(input.files);
        }

        function handleFolderSelect(input) {
            handleFiles(input.files);
        }

        async function handleFiles(files) {
            if (!files || files.length === 0) return;

            const progressDiv = document.getElementById('upload-progress');
            const progressFill = document.getElementById('progress-fill');
            const progressText = document.getElementById('progress-text');
            const resultsDiv = document.getElementById('upload-results');

            progressDiv.style.display = 'block';
            resultsDiv.innerHTML = '';
            progressFill.style.width = '0%';
            progressText.textContent = '准备上传...';

            const formData = new FormData();
            let fileCount = 0;

            // 追加选择的文件
            for (let i = 0; i < files.length; i++) {
                if (files[i].name.toLowerCase().endsWith('.dcm') || files[i].name.toLowerCase().endsWith('.ima')) {
                    formData.append('files', files[i]);
                    fileCount++;
                }
            }

            // 【新增】：读取用户选择的分类系统
            const sysId = document.getElementById('upload-system-id').value;
            if (sysId) {
                formData.append('system_id', sysId);
            }

            if (fileCount === 0) {
                showToast('没有找到文件', 'error');
                progressDiv.style.display = 'none';
                return;
            }

            progressText.textContent = `正在上传 ${fileCount} 个文件...`;

            try {
                const response = await fetch(`${API_BASE}/dicom/upload-folder`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                if (response.ok) {
                    const result = await response.json();
                    progressFill.style.width = '100%';
                    progressText.textContent = `上传完成！成功 ${result.uploaded} 个`;

                    resultsDiv.innerHTML = result.results.map(r => `
                        <div class="upload-result-item ${r.status}">
                            ${r.filename}: ${r.status === 'success' ? '✅ 成功' : '❌ ' + r.reason}
                        </div>
                    `).join('');

                    showToast(`成功上传 ${result.uploaded} 个 DICOM 文件`, 'success');
                    loadDicomStudies();
                } else {
                    const error = await response.json();
                    showToast(error.detail || '上传失败', 'error');
                }
            } catch (err) {
                showToast('上传出错: ' + err.message, 'error');
            }
        }

        async function loadDicomStudies() {
            try {
                const res = await fetch(`${API_BASE}/dicom/studies`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const studies = await res.json();
                    renderDicomStudies(studies);
                }
            } catch (err) {
                console.error('加载 DICOM 研究失败:', err);
            }
        }

        function renderDicomStudies(studies) {
            const list = document.getElementById('studies-list');
            if (!list) return;

            if (studies.length === 0) {
                list.innerHTML = '<p style="color: #888; text-align: center;">暂无 DICOM 研究</p>';
                return;
            }

            list.innerHTML = studies.map(s => `
                <div class="study-card" style="cursor: pointer;">
                    <div onclick="openViewer('${s.study_instance_uid || ''}', '${s.orthanc_id}')">
                        <div class="study-info">
                            <div>
                                <span class="meta-tag modality">${s.modality || 'N/A'}</span>
                                <span style="color: #888; margin-left: 10px;">${s.patient_sex === 'M' ? '男' : s.patient_sex === 'F' ? '女' : '未知'}</span>
                                <span style="color: #888; margin-left: 10px;">${s.patient_age || '年龄未知'}</span>
                            </div>
                        </div>
                        <div class="study-details">
                            <span>日期: ${formatDate(s.study_date) || 'N/A'}</span>
                            <span style="margin-left: 15px;">${s.study_description || ''}</span>
                        </div>
                        <div style="margin-top: 8px; color: #667eea; font-size: 12px;">点击打开阅片 →</div>
                    </div>
                    <button onclick="event.stopPropagation(); showCaseForm('${s.orthanc_id}', '${s.study_instance_uid || ''}')" style="background: #2ed573; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 10px;">创建病例</button>
                </div>
            `).join('');
        }

        function formatDate(dateStr) {
            if (!dateStr || dateStr.length !== 8) return dateStr;
            return `${dateStr.slice(0, 4)}-${dateStr.slice(4, 6)}-${dateStr.slice(6, 8)}`;
        }

        // ==================== 病例表单 ====================
        function showCaseForm(orthancId, studyUid) {
            document.getElementById('case-orthanc-id').value = orthancId;
            document.getElementById('case-study-uid').value = studyUid;
            document.getElementById('case-modal').style.display = 'flex';

            // 加载系统分类到下拉框
            const systemSelect = document.getElementById('case-system');
            systemSelect.innerHTML = '<option value="">请选择</option>';
            fetch(`${API_BASE}/systems/`)
                .then(res => res.json())
                .then(systems => {
                    systems.forEach(s => {
                        systemSelect.innerHTML += `<option value="${s.id}">${s.icon} ${s.name}</option>`;
                    });
                });
        }

        function closeCaseForm() {
            document.getElementById('case-modal').style.display = 'none';
            document.getElementById('case-form').reset();
        }

        async function submitCase(event) {
            event.preventDefault();

            const caseData = {
                title: document.getElementById('case-title').value,
                body_part: document.getElementById('case-body-part').value,
                modality: document.getElementById('case-modality').value,
                system_id: document.getElementById('case-system').value ? parseInt(document.getElementById('case-system').value) : null,
                description: document.getElementById('case-history').value,
                diagnosis: document.getElementById('case-diagnosis').value,
                teaching_points: document.getElementById('case-teaching').value
            };

            try {
                // 创建病例
                const res = await fetch(`${API_BASE}/cases/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(caseData)
                });

                if (res.ok) {
                    const caseResult = await res.json();

                    // 保存报告
                    const reportData = {
                        case_id: caseResult.id,
                        findings: document.getElementById('case-findings').value,
                        impression: document.getElementById('case-impression').value
                    };

                    await fetch(`${API_BASE}/cases/${caseResult.id}/reports`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(reportData)
                    });

                    showToast('病例创建成功！', 'success');
                    closeCaseForm();
                    loadCases();
                } else {
                    const error = await res.json();
                    showToast(error.detail || '创建失败', 'error');
                }
            } catch (err) {
                showToast('创建出错: ' + err.message, 'error');
            }
        }

        // ==================== 打开查看器 ====================
        function openViewer(studyInstanceUid, orthancId) {
            if (studyInstanceUid) {
                // 使用 StudyInstanceUID 打开 OHIF Viewer
                window.open(`/viewer/?StudyInstanceUIDs=${studyInstanceUid}`, '_blank');
            } else {
                // 使用 Orthanc ID 打开
                window.open(`/viewer/?OrthancStudyID=${orthancId}`, '_blank');
            }
        }

        // ==================== 工具函数 ====================
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (document.activeElement.id === 'username' || document.activeElement.id === 'password') {
                    login();
                }
            }
        });
    </script>
</body>
</html>
